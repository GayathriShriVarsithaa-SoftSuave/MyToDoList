name: Android CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# Essential to allow the workflow to create tags and releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean assembleDebug

      - name: Set Environment Variables
        run: |
          # Use GITHUB_HEAD_REF for PRs, otherwise GITHUB_REF_NAME
          RAW_BRANCH=${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          # Replace slashes with dashes to avoid git ref errors
          SAFE_BRANCH_NAME="${RAW_BRANCH//\//-}"
          
          echo "ARTIFACT_NAME=debug-apk-${SAFE_BRANCH_NAME}" >> $GITHUB_ENV
          echo "TAG_NAME=${SAFE_BRANCH_NAME}-v1.${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}