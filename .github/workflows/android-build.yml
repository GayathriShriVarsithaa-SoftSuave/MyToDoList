name: Android CI

on:
  push:
    branches:
      - '**'      # triggers on push to any branch
  pull_request:
    branches:
      - '**'      # triggers on PR to any branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Grant permission to gradlew
      - name: Grant Permission
        run: chmod +x gradlew

      # Step 4: Clean and build project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # Step 5: Create automatic tag (only on push)
      - name: Create Tag
        if: github.event_name == 'push'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          TAG=v1.${{ github.run_number }}
          git tag $TAG
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git --tags