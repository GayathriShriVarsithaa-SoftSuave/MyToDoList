name: Android CI

on:
  push:
    branches:
      - '**'      # triggers on push to any branch
  pull_request:
    branches:
      - '**'      # triggers on PR to any branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository with full history for tagging
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # necessary to push tags

      # Step 2: Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Grant permission to gradlew
      - name: Grant Permission
        run: chmod +x gradlew

      # Step 4: Clean and build project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # Step 5: Create automatic tag (only on push)
      - name: Create Tag
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git fetch --tags
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG=v1.${{ github.run_number }}
          echo "Creating tag $TAG"
          git tag $TAG
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git --tags