name: Android CI

on:
  push:
    branches:
      - '**'      # triggers on push to any branch
  pull_request:
    branches:
      - '**'      # triggers on PR to any branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Grant permission to gradlew
      - name: Grant Permission
        run: chmod +x gradlew

      # Step 4: Clean and build project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # Step 5: Create automatic tag (only on push)
      - name: Create Tag
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          TAG=v1.${{ github.run_number }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping."
          else
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag "$TAG"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} "$TAG"