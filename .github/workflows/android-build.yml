name: Android CI

on:
  push:
    branches:
      - '**'       # triggers on push to any branch
  pull_request:
    branches:
      - '**'       # triggers on PR to any branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository with full history
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Grant gradlew permission
      - name: Grant Permission
        run: chmod +x gradlew

      # 4. Clean and build the project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # 5. Upload APK as workflow artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # 6. Create a unique tag for this branch (optional for all branches)
      - name: Create Tag
        run: |
          TAG=${{ github.ref_name }}-v1.${{ github.run_id }}
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      # 7. Create GitHub release using the created tag
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8. Upload APK to the release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}