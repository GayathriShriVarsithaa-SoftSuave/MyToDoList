name: Android CI

on:
  push:
    branches:
      - main       # triggers only on pushes to main
  pull_request:
    branches:
      - main       # triggers on PR to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository with full history
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # important for tagging

      # Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # Grant gradlew permission
      - name: Grant Permission
        run: chmod +x gradlew

      # Clean and build the project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # Create automatic tag only on main branch pushes
      - name: Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG=v1.${{ github.run_number }}
          echo "Creating tag $TAG"
          git tag $TAG
          git push origin $TAG