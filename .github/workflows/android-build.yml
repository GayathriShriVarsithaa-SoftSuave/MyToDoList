name: Android CI

on:
  push:
    branches:
      - main       # triggers only on pushes to main
  pull_request:
    branches:
      - main       # triggers on PR to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository with full history (needed for tagging)
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Grant gradlew permission
      - name: Grant Permission
        run: chmod +x gradlew

      # 4. Clean and build the project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # 5. Upload APK as workflow artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # 6. Create automatic tag only on main branch pushes
      - name: Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG=v1.${{ github.run_number }}
          echo "Creating tag $TAG"
          git tag $TAG
          git push origin $TAG

      # 7. Create GitHub release and attach APK
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk