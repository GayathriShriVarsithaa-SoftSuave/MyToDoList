name: Android CI

on:
  push:
    branches:
      - '**'       # triggers on push to any branch
  pull_request:
    branches:
      - '**'       # triggers on PR to any branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository with full history
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup JDK
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Grant gradlew permission
      - name: Grant Permission
        run: chmod +x gradlew

      # 4. Clean and build the project
      - name: Build Project
        run: ./gradlew clean assembleDebug

      # 5. Sanitize branch name for artifact
      - name: Set Artifact Name
        run: |
          SAFE_BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          ARTIFACT_NAME="debug-apk-${SAFE_BRANCH_NAME}"
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV

      # 6. Upload APK as workflow artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: app/build/outputs/apk/debug/app-debug.apk

      # 7. Create a unique tag for this branch/run
      - name: Create Tag
        run: |
          SAFE_BRANCH_NAME="${GITHUB_REF_NAME//\//-}"
          TAG="${SAFE_BRANCH_NAME}-v1.${GITHUB_RUN_ID}"
          echo "TAG=$TAG" >> $GITHUB_ENV
          git tag $TAG
          git push origin $TAG

      # 8. Create GitHub release using the created tag
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 9. Upload APK to the release
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          tag_name: ${{ env.TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}